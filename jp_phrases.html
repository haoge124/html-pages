<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>日本語フレーズ集｜四字熟語・ことわざ・慣用句</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--surface:#161b27;--surface2:#1e2535;
  --border:rgba(240,192,64,.12);--gold:#f0c040;--gold-dim:rgba(240,192,64,.5);
  --text:#e4e0d8;--text-muted:#8a8aaa;--text-faint:#4a4a62;
}
body{font-family:"Hiragino Sans","Yu Gothic UI",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
header{background:linear-gradient(135deg,#0a0f1a 0%,#111827 100%);padding:24px 20px 16px;border-bottom:1px solid var(--border)}
header h1{font-size:1.4rem;font-weight:700;letter-spacing:.05em;color:var(--gold)}
header p{font-size:.8rem;color:var(--text-muted);margin-top:6px}
.controls{padding:14px 20px;background:rgba(13,15,21,.98);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10;display:flex;flex-wrap:wrap;gap:10px;align-items:center}
#search{flex:1;min-width:180px;padding:8px 14px;border:1.5px solid rgba(255,255,255,.1);border-radius:20px;font-size:.9rem;outline:none;font-family:inherit;background:var(--surface);color:var(--text)}
#search:focus{border-color:var(--gold)}
#search::placeholder{color:var(--text-faint)}
.types{display:flex;flex-wrap:wrap;gap:5px}
.types button{padding:5px 11px;border:1.5px solid rgba(255,255,255,.1);border-radius:16px;background:transparent;color:var(--text-muted);font-size:.78rem;cursor:pointer;font-family:inherit;transition:.15s}
.types button:hover{border-color:var(--gold);color:var(--gold)}
.types button.active{background:var(--gold);color:#0f1117;border-color:var(--gold);font-weight:700}
#show-checked-btn{padding:5px 11px;border:1.5px solid rgba(255,255,255,.1);border-radius:16px;background:transparent;color:var(--text-muted);font-size:.78rem;cursor:pointer;font-family:inherit;transition:.15s;white-space:nowrap}
#show-checked-btn.active{background:#22c55e;color:#fff;border-color:#22c55e}
#stats{padding:8px 20px;font-size:.78rem;color:var(--text-faint)}
#grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;padding:12px 20px 40px}
.card{background:var(--surface);border-radius:10px;padding:16px;border:1px solid var(--border);transition:box-shadow .2s,transform .2s,border-color .2s;position:relative;content-visibility:auto;contain-intrinsic-size:0 300px;cursor:pointer}
.card:hover{box-shadow:0 0 0 1px var(--gold-dim),0 4px 24px rgba(240,192,64,.08);transform:translateY(-1px);border-color:rgba(240,192,64,.28)}
@keyframes checkFade{to{opacity:0;transform:scale(.96)}}
.card.checking{animation:checkFade .18s ease forwards;pointer-events:none}
.phrase{font-size:1.7rem;font-weight:900;text-align:center;line-height:1.2;margin-bottom:6px;font-family:"Hiragino Mincho ProN","Yu Mincho",Georgia,serif;color:var(--text)}
.type-badge{text-align:center;margin-bottom:8px}
.type-badge span{display:inline-block;padding:2px 9px;border-radius:10px;font-size:.68rem;font-weight:700}
.t-四字熟語{background:rgba(167,139,250,.12);color:#a78bfa;border:1px solid rgba(167,139,250,.25)}
.t-ことわざ{background:rgba(251,146,60,.12);color:#fb923c;border:1px solid rgba(251,146,60,.25)}
.t-慣用句{background:rgba(52,211,153,.12);color:#34d399;border:1px solid rgba(52,211,153,.25)}
.reading{text-align:center;font-size:.8rem;color:var(--text-muted);margin-bottom:10px;letter-spacing:.04em;filter:blur(5px);user-select:none;transition:filter .2s}
.card.revealed .reading{filter:none;user-select:auto}
.anim-box{position:relative;margin:10px auto 12px;max-width:170px;aspect-ratio:1/1;border-radius:14px;overflow:hidden;border:1px solid rgba(240,192,64,.16);background:var(--surface2);box-shadow:inset 0 0 0 1px rgba(255,255,255,.03);-webkit-tap-highlight-color:transparent}
.anim-box img{width:100%;height:100%;object-fit:cover;display:block;filter:saturate(.95);transform:translateZ(0)}
.anim-play{position:absolute;inset:auto 8px 8px auto;min-width:36px;height:32px;border-radius:999px;border:1px solid rgba(255,255,255,.18);background:rgba(15,17,23,.78);backdrop-filter:blur(8px);color:var(--gold);font-size:.88rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s}
.anim-box:hover .anim-play,.anim-box.playing .anim-play{background:var(--gold);color:#0f1117;border-color:var(--gold)}
.anim-box.loading .anim-play{opacity:.65;pointer-events:none}
.meaning{font-size:.74rem;color:var(--text-muted);border-top:1px solid rgba(255,255,255,.05);padding-top:8px;line-height:1.6;margin-bottom:6px;filter:blur(5px);user-select:none;transition:filter .2s}
.card.revealed .meaning{filter:none;user-select:auto}
.examples{border-top:1px solid rgba(255,255,255,.05);padding-top:8px;filter:blur(5px);user-select:none;transition:filter .2s}
.card.revealed .examples{filter:none;user-select:auto}
.ex-label{font-size:.63rem;color:var(--text-faint);font-weight:600;letter-spacing:.06em;margin-bottom:4px}
.ex{font-size:.73rem;color:var(--text-muted);line-height:1.55;padding-left:8px;border-left:2px solid rgba(240,192,64,.25);margin-bottom:3px}
.reveal-hint{font-size:.65rem;color:var(--text-faint);text-align:center;margin-top:8px;letter-spacing:.04em}
.card.revealed .reveal-hint{display:none}
.no-results{text-align:center;padding:60px;color:var(--text-faint);grid-column:1/-1}
footer{text-align:center;padding:20px;font-size:.72rem;color:var(--text-faint);border-top:1px solid var(--border)}
.check-btn{position:absolute;top:10px;right:10px;width:28px;height:28px;border-radius:50%;border:1.5px solid rgba(255,255,255,.12);background:transparent;font-size:.8rem;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-faint);transition:.15s;-webkit-tap-highlight-color:transparent}
.check-btn:hover{border-color:#22c55e;color:#22c55e}
.check-btn.checked{background:#22c55e;border-color:#22c55e;color:#fff}
.speak-btn{position:absolute;top:10px;left:10px;width:28px;height:28px;border-radius:50%;border:1.5px solid rgba(255,255,255,.12);background:transparent;font-size:.8rem;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-faint);transition:.15s;-webkit-tap-highlight-color:transparent}
.speak-btn:hover{border-color:#3b82f6;color:#3b82f6}
.speak-btn.speaking{background:#3b82f6;border-color:#3b82f6;color:#fff}
@media(max-width:500px){#grid{grid-template-columns:1fr;gap:8px;padding:8px 10px 40px}.phrase{font-size:1.4rem}}
</style>
</head>
<body>
<header>
  <h1>日本語フレーズ集</h1>
  <p id="subtitle">読み込み中…</p>
</header>
<div class="controls">
  <input type="text" id="search" placeholder="フレーズ・読み・意味で検索…">
  <div class="types">
    <button data-type="" class="active">すべて</button>
    <button data-type="四字熟語">四字熟語</button>
    <button data-type="ことわざ">ことわざ</button>
    <button data-type="慣用句">慣用句</button>
  </div>
  <button id="show-checked-btn">✓ 0件</button>
</div>
<div id="stats"></div>
<div id="grid"></div>
<footer>四字熟語・ことわざ・慣用句コレクション</footer>

<script>
const STORAGE_KEY='jp_phrases_checked_v1';
let checked=new Set(JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]'));
let showChecked=false;
let allData=[],ct='',cs='',animMap=new Map();

function saveChecked(){localStorage.setItem(STORAGE_KEY,JSON.stringify([...checked]));}

function updateCheckedBtn(){
  const btn=document.getElementById('show-checked-btn');
  btn.textContent=`✓ ${checked.size}件`;
  btn.classList.toggle('active',showChecked);
}

function speak(phrase){
  if(!window.speechSynthesis)return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(phrase);
  u.lang='ja-JP';u.rate=0.85;
  const btn=document.querySelector(`.speak-btn[data-phrase="${CSS.escape(phrase)}"]`);
  if(btn)btn.classList.add('speaking');
  u.onend=u.onerror=()=>{if(btn)btn.classList.remove('speaking');};
  speechSynthesis.speak(u);
}

function toggleCheck(phrase,e){
  e.stopPropagation();
  const wasChecked=checked.has(phrase);
  wasChecked?checked.delete(phrase):checked.add(phrase);
  saveChecked();
  const btn=document.querySelector(`.check-btn[data-phrase="${CSS.escape(phrase)}"]`);
  if(btn)btn.classList.toggle('checked',!wasChecked);
  if(!showChecked&&!wasChecked){
    const card=btn&&btn.closest('.card');
    if(card){
      card.classList.add('checking');
      card.addEventListener('animationend',()=>{
        card.remove();
        updateStats();
      },{once:true});
    }
  } else {
    updateStats();
  }
  updateCheckedBtn();
}

function updateStats(){
  const cnt=document.querySelectorAll('#grid .card').length;
  document.getElementById('stats').textContent=`${cnt}件 表示中（未チェック：${allData.length-checked.size}件 / 収録：${allData.length}件）`;
}

function esc(s){return s.replace(/'/g,"\\'");}
function attr(s){return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');}

function makeAnim(phrase){
  const a=animMap.get(phrase);
  if(!a)return'';
  return`<div class="anim-box" data-phrase="${attr(phrase)}" data-thumb="${attr(a.thumbnail)}" data-webp="${attr(a.webp)}" onclick="toggleAnim(this,event)">
<img src="${attr(a.thumbnail)}" alt="${attr(phrase)} animation preview" loading="lazy" decoding="async">
<button class="anim-play" type="button" aria-label="アニメーション再生">▶</button>
</div>`;
}

function toggleAnim(box,e){
  e.stopPropagation();
  const img=box.querySelector('img');
  const btn=box.querySelector('.anim-play');
  const playing=box.classList.contains('playing');
  const next=playing?box.dataset.thumb:box.dataset.webp;
  box.classList.toggle('playing',!playing);
  box.classList.add('loading');
  btn.textContent=playing?'▶':'■';
  img.onload=()=>box.classList.remove('loading');
  img.onerror=()=>{box.classList.remove('loading');box.classList.remove('playing');btn.textContent='▶';};
  img.src=next;
}

function makeCard(d){
  const[phrase,yomi,type,meaning,exs]=d;
  const isChecked=checked.has(phrase);
  const exH=exs&&exs.length
    ?`<div class="examples"><div class="ex-label">例文</div>${exs.map(e=>`<div class="ex">${e}</div>`).join('')}</div>`
    :'';
  return`<div class="card" onclick="this.classList.toggle('revealed')">
<button class="speak-btn" data-phrase="${phrase}" title="読み上げ" onclick="event.stopPropagation();speak('${esc(phrase)}')">🔊</button>
<button class="check-btn${isChecked?' checked':''}" data-phrase="${phrase}" title="覚えた" onclick="toggleCheck('${esc(phrase)}',event)">✓</button>
<div class="phrase">${phrase}</div>
<div class="type-badge"><span class="t-${type}">${type}</span></div>
<div class="reading">${yomi}</div>
${makeAnim(phrase)}
<div class="meaning">${meaning}</div>
${exH}
<div class="reveal-hint">タップして読み・意味を表示</div>
</div>`;
}

function render(data){
  let cnt=0;
  const html=data.map(d=>{
    if(checked.has(d[0])&&!showChecked)return'';
    if(ct&&d[2]!==ct)return'';
    if(cs){
      const hay=d[0]+d[1]+d[2]+d[3]+(d[4]||[]).join('');
      if(!hay.includes(cs))return'';
    }
    cnt++;return makeCard(d);
  }).join('');
  document.getElementById('grid').innerHTML=html||'<div class="no-results">該当するフレーズが見つかりません</div>';
  document.getElementById('stats').textContent=`${cnt}件 表示中（未チェック：${allData.length-checked.size}件 / 収録：${allData.length}件）`;
  updateCheckedBtn();
}

async function init(){
  document.getElementById('grid').innerHTML='<div class="no-results">読み込み中…</div>';
  try{
    const [r,ar]=await Promise.all([
      fetch('phrases/main.json'),
      fetch('phrases/animations/manifest.json').catch(()=>null)
    ]);
    if(!r.ok)throw new Error(`main.json: ${r.status}`);
    allData=await r.json();
    if(ar&&ar.ok){
      const anims=await ar.json();
      animMap=new Map(anims.map(a=>[a.phrase,a]));
    }
    const counts={};
    allData.forEach(d=>{counts[d[2]]=(counts[d[2]]||0)+1;});
    document.getElementById('subtitle').textContent=
      `四字熟語 ${counts['四字熟語']||0}件 / ことわざ ${counts['ことわざ']||0}件 / 慣用句 ${counts['慣用句']||0}件｜カードをタップして読み・意味を表示`;
    render(allData);
  }catch(e){
    document.getElementById('grid').innerHTML=`<div class="no-results">データ読み込みエラー: ${e.message}</div>`;
  }
}

document.getElementById('search').addEventListener('input',e=>{cs=e.target.value.trim();render(allData);});

document.querySelector('.types').addEventListener('click',e=>{
  const btn=e.target.closest('button[data-type]');
  if(!btn)return;
  ct=btn.dataset.type;
  document.querySelectorAll('.types button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render(allData);
});

document.getElementById('show-checked-btn').addEventListener('click',()=>{
  showChecked=!showChecked;
  render(allData);
});

init();
</script>
</body>
</html>
