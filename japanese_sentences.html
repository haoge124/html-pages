<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>日本語常用フレーズ集</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Hiragino Sans","Yu Gothic UI",sans-serif;background:#f5f4f0;color:#1a1a1a;min-height:100vh}
header{background:#1a1a2e;color:#fff;padding:24px 20px 16px}
header h1{font-size:1.4rem;font-weight:700;letter-spacing:.05em}
header p{font-size:.8rem;color:#aab;margin-top:6px}
.controls{padding:14px 20px;background:#fff;border-bottom:1px solid #e0deda;position:sticky;top:0;z-index:10;display:flex;flex-wrap:wrap;gap:10px;align-items:center}
#search{flex:1;min-width:180px;padding:8px 14px;border:1.5px solid #ccc;border-radius:20px;font-size:.9rem;outline:none;font-family:inherit}
#search:focus{border-color:#1a1a2e}
.cats{display:flex;flex-wrap:wrap;gap:5px}
.cats button{padding:5px 11px;border:1.5px solid #ccc;border-radius:16px;background:#fff;font-size:.78rem;cursor:pointer;font-family:inherit;transition:.15s}
.cats button.active{background:#1a1a2e;color:#fff;border-color:#1a1a2e}
#show-checked-btn{padding:5px 11px;border:1.5px solid #ccc;border-radius:16px;background:#fff;font-size:.78rem;cursor:pointer;font-family:inherit;transition:.15s;white-space:nowrap}
#show-checked-btn.active{background:#22c55e;color:#fff;border-color:#22c55e}
#settings-btn{padding:5px 10px;border:1.5px solid #ccc;border-radius:16px;background:#fff;font-size:.85rem;cursor:pointer;transition:.15s}
#settings-btn:hover{border-color:#1a1a2e}
#stats{padding:8px 20px;font-size:.78rem;color:#666}
#grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px;padding:12px 20px 40px}
.card{background:#fff;border-radius:10px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,.07);transition:.15s;position:relative}
.card:hover{box-shadow:0 3px 12px rgba(0,0,0,.12);transform:translateY(-1px)}
.sentence{font-size:1.25rem;font-weight:700;line-height:1.5;margin-bottom:6px;padding-right:36px;padding-left:36px;text-align:center}
.reading{font-size:.75rem;color:#888;text-align:center;margin-bottom:8px}
.cat-badge{text-align:center;margin-bottom:8px}
.cat-badge span{display:inline-block;padding:2px 8px;border-radius:10px;font-size:.65rem;font-weight:700}
.meaning{font-size:.8rem;color:#444;border-top:1px solid #f0ede8;padding-top:8px;line-height:1.55}
.note{font-size:.72rem;color:#888;margin-top:4px;font-style:italic}
.check-btn{position:absolute;top:10px;right:10px;width:28px;height:28px;border-radius:50%;border:1.5px solid #ccc;background:#fff;font-size:.8rem;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#aaa;transition:.15s;-webkit-tap-highlight-color:transparent}
.check-btn:hover{border-color:#22c55e;color:#22c55e}
.check-btn.checked{background:#22c55e;border-color:#22c55e;color:#fff}
.speak-btn{position:absolute;top:10px;left:10px;width:28px;height:28px;border-radius:50%;border:1.5px solid #ccc;background:#fff;font-size:.8rem;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#aaa;transition:.15s;-webkit-tap-highlight-color:transparent}
.speak-btn:hover{border-color:#3b82f6;color:#3b82f6}
.speak-btn.speaking{background:#3b82f6;border-color:#3b82f6;color:#fff}
.no-results{text-align:center;padding:60px;color:#999;grid-column:1/-1}
footer{text-align:center;padding:20px;font-size:.72rem;color:#aaa;border-top:1px solid #e0deda}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:14px;padding:24px;width:min(420px,90vw);box-shadow:0 8px 32px rgba(0,0,0,.18)}
.modal h2{font-size:1rem;margin-bottom:14px;color:#1a1a2e}
.modal label{font-size:.78rem;color:#666;display:block;margin-bottom:4px}
.modal input{width:100%;padding:7px 12px;border:1.5px solid #ccc;border-radius:8px;font-size:.85rem;font-family:inherit;outline:none;margin-bottom:12px}
.modal input:focus{border-color:#3b82f6}
.modal .hint{font-size:.7rem;color:#aaa;margin-top:-8px;margin-bottom:12px}
.modal-btns{display:flex;gap:8px;justify-content:flex-end}
.modal-btns button{padding:6px 16px;border-radius:8px;border:none;cursor:pointer;font-size:.82rem;font-family:inherit}
.btn-save{background:#1a1a2e;color:#fff}
.btn-cancel{background:#f0ede8;color:#555}
@media(max-width:500px){#grid{grid-template-columns:1fr;gap:8px;padding:8px 10px 40px}.sentence{font-size:1.1rem}}
</style>
</head>
<body>
<header>
  <h1>日本語常用フレーズ集</h1>
  <p>挨拶・買い物・レストラン・交通・緊急・日常会話・ビジネス ｜読み・中国語訳・音声付き</p>
</header>
<div class="controls">
  <input type="text" id="search" placeholder="フレーズ・読み・意味で検索…">
  <div class="cats">
    <button data-cat="" class="active">すべて</button>
    <button data-cat="greet">挨拶</button>
    <button data-cat="shop">買い物</button>
    <button data-cat="restaurant">食事</button>
    <button data-cat="transport">交通</button>
    <button data-cat="emergency">緊急</button>
    <button data-cat="daily">日常</button>
    <button data-cat="business">仕事</button>
  </div>
  <button id="show-checked-btn">✓ 0件</button>
  <button id="settings-btn" title="音声設定">⚙️</button>
</div>
<div id="stats"></div>
<div id="grid"></div>
<footer>音声は VOICEVOX を使用。⚙️ から URL を設定してください。</footer>

<div class="modal-overlay" id="settings-modal">
  <div class="modal">
    <h2>🔊 音声設定（VOICEVOX）</h2>
    <label>VOICEVOX サーバーURL</label>
    <input type="url" id="vv-url-input" placeholder="https://xxxx.trycloudflare.com">
    <div class="hint">空欄の場合はブラウザ内蔵音声を使用。</div>
    <label>話者</label>
    <input type="number" id="vv-speaker-input" value="3" min="1" max="99">
    <div class="hint">3=ずんだもん / 2=四国めたん / 8=春日部つむぎ など</div>
    <div class="modal-btns">
      <button class="btn-cancel" id="settings-cancel">キャンセル</button>
      <button class="btn-save" id="settings-save">保存</button>
    </div>
  </div>
</div>

<script>
const CAT_LABEL={greet:'挨拶・基本',shop:'買い物',restaurant:'食事',transport:'交通',emergency:'緊急',daily:'日常会話',business:'仕事'};
const CAT_COLOR={
  greet:{bg:'#dcfce7',fg:'#166534'},
  shop:{bg:'#dbeafe',fg:'#1e40af'},
  restaurant:{bg:'#fef9c3',fg:'#713f12'},
  transport:{bg:'#ffedd5',fg:'#9a3412'},
  emergency:{bg:'#fee2e2',fg:'#991b1b'},
  daily:{bg:'#f3e8ff',fg:'#581c87'},
  business:{bg:'#e2e8f0',fg:'#1e293b'},
};

const VV_KEY='vv_url_v1';
const VV_SPK_KEY='vv_speaker_v1';
const VV_DEFAULT='https://grande-slip-capitol-hydrocodone.trycloudflare.com';
function getVvUrl(){return localStorage.getItem(VV_KEY)||VV_DEFAULT;}
function getVvSpeaker(){return parseInt(localStorage.getItem(VV_SPK_KEY)||'3');}

function setBtnState(id,on){
  const btn=document.querySelector(`.speak-btn[data-id="${id}"]`);
  if(btn)btn.classList.toggle('speaking',on);
}
async function speakVoicevox(text,id){
  const base=getVvUrl().replace(/\/$/,'');
  const spk=getVvSpeaker();
  setBtnState(id,true);
  try{
    const qr=await fetch(`${base}/audio_query?text=${encodeURIComponent(text)}&speaker=${spk}`,{method:'POST'});
    if(!qr.ok)throw new Error('query');
    const query=await qr.json();
    const ar=await fetch(`${base}/synthesis?speaker=${spk}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(query)});
    if(!ar.ok)throw new Error('synthesis');
    const audio=new Audio(URL.createObjectURL(await ar.blob()));
    audio.onended=()=>setBtnState(id,false);
    audio.onerror=()=>setBtnState(id,false);
    audio.play();
  }catch(e){
    setBtnState(id,false);
    speakFallback(text,id);
  }
}
function speakFallback(text,id){
  if(!window.speechSynthesis)return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='ja-JP';u.rate=0.85;
  setBtnState(id,true);
  u.onend=()=>setBtnState(id,false);
  u.onerror=()=>setBtnState(id,false);
  speechSynthesis.speak(u);
}
function speak(text,id){
  getVvUrl()?speakVoicevox(text,id):speakFallback(text,id);
}

const STORAGE_KEY='sentences_checked_v1';
let checked=new Set(JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]'));
let showChecked=false;
function saveChecked(){localStorage.setItem(STORAGE_KEY,JSON.stringify([...checked]));}
function toggleCheck(id){checked.has(id)?checked.delete(id):checked.add(id);saveChecked();render();}
function updateCheckedBtn(){
  const btn=document.getElementById('show-checked-btn');
  btn.textContent=`✓ ${checked.size}件`;
  btn.classList.toggle('active',showChecked);
}

let allData=[],cc='',cs='';

function makeCard(d,i){
  const[sentence,reading,cat,meaning,notes]=d;
  const id=`s${i}`;
  const isChecked=checked.has(id);
  const c=CAT_COLOR[cat]||{bg:'#e2e8f0',fg:'#1e293b'};
  const noteH=notes&&notes.length?`<div class="note">${notes.join(' ')}</div>`:'';
  return`<div class="card">
<button class="speak-btn" data-id="${id}" data-text="${sentence.replace(/"/g,'&quot;')}" title="読み上げ">🔊</button>
<button class="check-btn${isChecked?' checked':''}" data-id="${id}" title="覚えた">✓</button>
<div class="sentence">${sentence}</div>
<div class="reading">${reading}</div>
<div class="cat-badge"><span style="background:${c.bg};color:${c.fg}">${CAT_LABEL[cat]||cat}</span></div>
<div class="meaning">${meaning}${noteH}</div>
</div>`;
}

function render(){
  const data=cc?allData.filter(d=>d[2]===cc):allData;
  let cnt=0;
  const html=data.map(d=>{
    const i=allData.indexOf(d);
    const id=`s${i}`;
    if(checked.has(id)&&!showChecked)return'';
    if(cs){
      const hay=d[0]+d[1]+d[3]+(d[4]||[]).join('');
      if(!hay.includes(cs))return'';
    }
    cnt++;return makeCard(d,i);
  }).join('');
  document.getElementById('grid').innerHTML=html||'<div class="no-results">該当するフレーズが見つかりません</div>';
  document.getElementById('stats').textContent=`${cnt}件 表示中（未チェック：${allData.length-checked.size}件 / 収録：${allData.length}件）`;
  updateCheckedBtn();
}

async function init(){
  document.getElementById('grid').innerHTML='<div class="no-results">読み込み中…</div>';
  try{
    const r=await fetch('sentences/all.json');
    if(!r.ok)throw new Error(`all.json: ${r.status}`);
    allData=await r.json();
    document.querySelector('header p').textContent=
      `全${allData.length}フレーズ ｜挨拶・買い物・食事・交通・緊急・日常会話・ビジネス｜読み・中国語訳・音声付き`;
    render();
  }catch(e){
    document.getElementById('grid').innerHTML=`<div class="no-results">データ読み込みエラー: ${e.message}</div>`;
  }
}

document.getElementById('search').addEventListener('input',e=>{cs=e.target.value.trim();render();});
document.querySelector('.cats').addEventListener('click',e=>{
  const b=e.target.closest('button');if(!b)return;
  document.querySelectorAll('.cats button').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');cc=b.dataset.cat;render();
});
document.getElementById('show-checked-btn').addEventListener('click',()=>{showChecked=!showChecked;render();});
document.getElementById('grid').addEventListener('click',e=>{
  const sb=e.target.closest('.speak-btn');
  if(sb){speak(sb.dataset.text,sb.dataset.id);return;}
  const cb=e.target.closest('.check-btn');if(!cb)return;
  toggleCheck(cb.dataset.id);
});
document.getElementById('settings-btn').addEventListener('click',()=>{
  document.getElementById('vv-url-input').value=getVvUrl();
  document.getElementById('vv-speaker-input').value=getVvSpeaker();
  document.getElementById('settings-modal').classList.add('open');
});
document.getElementById('settings-cancel').addEventListener('click',()=>{
  document.getElementById('settings-modal').classList.remove('open');
});
document.getElementById('settings-save').addEventListener('click',()=>{
  const url=document.getElementById('vv-url-input').value.trim();
  const spk=document.getElementById('vv-speaker-input').value.trim();
  if(url)localStorage.setItem(VV_KEY,url);else localStorage.removeItem(VV_KEY);
  localStorage.setItem(VV_SPK_KEY,spk||'3');
  document.getElementById('settings-modal').classList.remove('open');
});
document.getElementById('settings-modal').addEventListener('click',e=>{
  if(e.target===e.currentTarget)e.currentTarget.classList.remove('open');
});

init();
</script>
</body></html>
