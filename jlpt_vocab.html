<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>JLPT N5〜N3 核心語彙表</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Hiragino Sans","Yu Gothic UI",sans-serif;background:#f5f4f0;color:#1a1a1a;min-height:100vh}
header{background:#1a1a2e;color:#fff;padding:24px 20px 16px}
header h1{font-size:1.4rem;font-weight:700;letter-spacing:.05em}
header p{font-size:.8rem;color:#aab;margin-top:6px}
header .legend{margin-top:10px;display:flex;flex-wrap:wrap;gap:14px;font-size:.76rem;color:#ccd}
header .legend span{display:inline-flex;align-items:center;gap:5px}
.h-demo{display:inline-block;border-top:2px solid #e88;padding-top:1px}
.drop-demo{display:inline-block;border-top:2px solid #e88;border-right:2px solid #e88;padding-top:1px;padding-right:2px}
.controls{padding:14px 20px;background:#fff;border-bottom:1px solid #e0deda;position:sticky;top:0;z-index:10;display:flex;flex-wrap:wrap;gap:10px;align-items:center}
#search{flex:1;min-width:180px;padding:8px 14px;border:1.5px solid #ccc;border-radius:20px;font-size:.9rem;outline:none;font-family:inherit}
#search:focus{border-color:#1a1a2e}
.levels{display:flex;flex-wrap:wrap;gap:5px}
.levels button{padding:5px 11px;border:1.5px solid #ccc;border-radius:16px;background:#fff;font-size:.78rem;cursor:pointer;font-family:inherit;transition:.15s}
.levels button.active{background:#1a1a2e;color:#fff;border-color:#1a1a2e}
#stats{padding:8px 20px;font-size:.78rem;color:#666}
#grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;padding:12px 20px 40px}
.card{background:#fff;border-radius:10px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,.07);transition:.15s}
.card:hover{box-shadow:0 3px 12px rgba(0,0,0,.12);transform:translateY(-1px)}
.word{font-size:2.2rem;font-weight:900;text-align:center;line-height:1;margin-bottom:6px}
.level-badge{text-align:center;margin-bottom:10px}
.level-badge span{display:inline-block;padding:2px 8px;border-radius:10px;font-size:.68rem;font-weight:700}
.lv-n5{background:#dcfce7;color:#166534}
.lv-n4{background:#dbeafe;color:#1e40af}
.lv-n3{background:#f3e8ff;color:#581c87}
.reading-row{display:flex;align-items:baseline;gap:6px;margin-bottom:6px;flex-wrap:wrap}
.pos{font-size:.68rem;color:#999;border:1px solid #e0deda;border-radius:8px;padding:1px 6px;white-space:nowrap}
.reading-text{display:inline-flex;flex-wrap:wrap;align-items:baseline;font-size:.82rem}
.h{display:inline-block;border-top:2px solid #c0392b;padding-top:1px;margin-top:3px}
.h.drop{border-right:2px solid #c0392b;padding-right:1px;margin-right:1px}
.l{display:inline-block}
.flat-end::after{content:"→";font-size:.6rem;color:#aaa;margin-left:2px}
.meaning{font-size:.74rem;color:#444;border-top:1px solid #f0ede8;padding-top:8px;line-height:1.55;margin-bottom:6px}
.examples{border-top:1px solid #f0ede8;padding-top:8px}
.ex-label{font-size:.63rem;color:#aaa;font-weight:600;letter-spacing:.06em;margin-bottom:4px}
.ex{font-size:.73rem;color:#555;line-height:1.55;padding-left:8px;border-left:2px solid #e8e4de;margin-bottom:3px}
.no-results{text-align:center;padding:60px;color:#999;grid-column:1/-1}
footer{text-align:center;padding:20px;font-size:.72rem;color:#aaa;border-top:1px solid #e0deda}
.card{position:relative}
.check-btn{position:absolute;top:10px;right:10px;width:28px;height:28px;border-radius:50%;border:1.5px solid #ccc;background:#fff;font-size:.8rem;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#aaa;transition:.15s;-webkit-tap-highlight-color:transparent}
.check-btn:hover{border-color:#22c55e;color:#22c55e}
.check-btn.checked{background:#22c55e;border-color:#22c55e;color:#fff}
.speak-btn{position:absolute;top:10px;left:10px;width:28px;height:28px;border-radius:50%;border:1.5px solid #ccc;background:#fff;font-size:.8rem;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#aaa;transition:.15s;-webkit-tap-highlight-color:transparent}
.speak-btn:hover{border-color:#3b82f6;color:#3b82f6}
.speak-btn.speaking{background:#3b82f6;border-color:#3b82f6;color:#fff}
#show-checked-btn{padding:5px 11px;border:1.5px solid #ccc;border-radius:16px;background:#fff;font-size:.78rem;cursor:pointer;font-family:inherit;transition:.15s;white-space:nowrap}
#show-checked-btn.active{background:#22c55e;color:#fff;border-color:#22c55e}
@media(max-width:500px){#grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;padding:8px 10px 40px}.word{font-size:1.8rem}}
</style>
</head>
<body>
<header>
  <h1>JLPT N5〜N3 核心語彙表</h1>
  <p>N5・N4・N3の核心語彙 ｜読み・ピッチアクセント・日本語説明・例文付き</p>
  <div class="legend">
    <span><span class="h-demo">高</span> 高い音（上線）</span>
    <span><span class="drop-demo">高</span>↓ 下がり目（右線）</span>
    <span>低 飾りなし</span>
    <span>→ 平板型</span>
  </div>
</header>
<div class="controls">
  <input type="text" id="search" placeholder="語彙・読み・意味・例文で検索…">
  <div class="levels">
    <button data-lv="" class="active">すべて</button>
    <button data-lv="n5">N5</button>
    <button data-lv="n4">N4</button>
    <button data-lv="n3">N3</button>
  </div>
  <button id="show-checked-btn">✓ 0語</button>
</div>
<div id="stats"></div>
<div id="grid"></div>
<footer>アクセントはNHK東京方言基準。詳細はNHK日本語発音アクセント新辞典でご確認ください。</footer>

<script>
const LV_LABEL={n5:'N5',n4:'N4',n3:'N3'};
const LV_CLASS={n5:'lv-n5',n4:'lv-n4',n3:'lv-n3'};

function splitMorae(s){
  const sm='ゃゅょャュョぁぃぅぇぉァィゥェォ';
  const m=[];
  for(let i=0;i<s.length;i++){
    const c=s[i];
    if(c==='-'||c==='.'||c===' ')continue;
    if(i+1<s.length&&sm.includes(s[i+1])){m.push(c+s[i+1]);i++;}
    else m.push(c);
  }
  return m;
}
function accentHTML(reading,acc){
  const m=splitMorae(reading);
  if(acc===undefined||acc===null||acc===-1)return reading;
  let h='';
  for(let i=0;i<m.length;i++){
    const p=i+1;
    const hi=acc===0?p>1:acc===1?p===1:p>=2&&p<=acc;
    const drop=acc>0&&p===acc;
    h+=hi?`<span class="h${drop?' drop':''}">${m[i]}</span>`:`<span class="l">${m[i]}</span>`;
  }
  if(acc===0&&m.length>1)h+='<span class="flat-end"></span>';
  return h;
}
const STORAGE_KEY='jlpt_checked_v1';
let checked=new Set(JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]'));
let showChecked=false;

function saveChecked(){localStorage.setItem(STORAGE_KEY,JSON.stringify([...checked]));}
function toggleCheck(word){
  checked.has(word)?checked.delete(word):checked.add(word);
  saveChecked();render(currentData());
}
function updateCheckedBtn(){
  const btn=document.getElementById('show-checked-btn');
  btn.textContent=`✓ ${checked.size}語`;
  btn.classList.toggle('active',showChecked);
}

function speak(word){
  if(!window.speechSynthesis)return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(word);
  u.lang='ja-JP';u.rate=0.9;
  const btn=document.querySelector(`.speak-btn[data-word="${CSS.escape(word)}"]`);
  if(btn)btn.classList.add('speaking');
  u.onend=()=>{if(btn)btn.classList.remove('speaking');};
  u.onerror=()=>{if(btn)btn.classList.remove('speaking');};
  speechSynthesis.speak(u);
}

function makeCard(d){
  const[word,yomi,acc,pos,meaning,exs,lv]=d;
  const isChecked=checked.has(word);
  const exH=exs&&exs.length?`<div class="examples"><div class="ex-label">例文</div>${exs.map(e=>`<div class="ex">${e}</div>`).join('')}</div>`:'';
  return`<div class="card" data-lv="${lv}">
<button class="speak-btn" data-word="${word}" title="読み上げ">🔊</button>
<button class="check-btn${isChecked?' checked':''}" data-word="${word}" title="覚えた">✓</button>
<div class="word">${word}</div>
<div class="level-badge"><span class="${LV_CLASS[lv]||''}">${LV_LABEL[lv]||''}</span></div>
<div class="reading-row"><span class="pos">${pos}</span><span class="reading-text">${accentHTML(yomi,acc)}</span></div>
<div class="meaning">${meaning}</div>
${exH}
</div>`;
}

const cache={};
let allData=[],cl='',cs='';

function render(data){
  let cnt=0;
  const html=data.map(d=>{
    const isChecked=checked.has(d[0]);
    if(isChecked&&!showChecked)return'';
    if(cs){
      const hay=d[0]+d[1]+d[3]+d[4]+(d[5]||[]).join('');
      if(!hay.includes(cs))return'';
    }
    cnt++;return makeCard(d);
  }).join('');
  document.getElementById('grid').innerHTML=html||'<div class="no-results">該当する語彙が見つかりません</div>';
  const total=data.filter(d=>!checked.has(d[0])||showChecked).length;
  document.getElementById('stats').textContent=`${cnt}語 表示中（未チェック：${allData.length-checked.size}語 / 収録：${allData.length}語）`;
  updateCheckedBtn();
}

function currentData(){return cl?(cache[cl]||[]):allData;}

async function loadLevel(lv){
  if(cache[lv])return cache[lv];
  const r=await fetch(`jlpt/${lv}.json`);
  if(!r.ok)throw new Error(`${lv}.json: ${r.status}`);
  const data=await r.json();
  cache[lv]=data.map(d=>[d[0],d[1],d[2],d[3],d[4],d[5],lv]);
  return cache[lv];
}

async function init(){
  document.getElementById('grid').innerHTML='<div class="no-results">読み込み中…</div>';
  try{
    const all=await Promise.all(['n5','n4','n3'].map(loadLevel));
    allData=all.flat();
    document.querySelector('header p').textContent=
      `N5：${cache.n5.length}語 / N4：${cache.n4.length}語 / N3：${cache.n3.length}語 ｜読み・ピッチアクセント・日本語説明・例文付き`;
    render(allData);
  }catch(e){
    document.getElementById('grid').innerHTML=`<div class="no-results">データ読み込みエラー: ${e.message}<br>ページを再読み込みしてください。</div>`;
  }
}

document.getElementById('search').addEventListener('input',e=>{cs=e.target.value.trim();render(currentData());});
document.querySelector('.levels').addEventListener('click',e=>{
  const b=e.target.closest('button');if(!b)return;
  document.querySelectorAll('.levels button').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');cl=b.dataset.lv;render(currentData());
});
document.getElementById('show-checked-btn').addEventListener('click',()=>{
  showChecked=!showChecked;render(currentData());
});
document.getElementById('grid').addEventListener('click',e=>{
  const sb=e.target.closest('.speak-btn');
  if(sb){speak(sb.dataset.word);return;}
  const btn=e.target.closest('.check-btn');if(!btn)return;
  toggleCheck(btn.dataset.word);
});

init();
</script>
</body></html>
