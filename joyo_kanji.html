<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>常用漢字一覧 — 読み・アクセント・意味・例文</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Hiragino Sans","Yu Gothic UI",sans-serif;background:#f5f4f0;color:#1a1a1a;min-height:100vh}
header{background:#1a1a2e;color:#fff;padding:24px 20px 16px}
header h1{font-size:1.4rem;font-weight:700;letter-spacing:.05em}
header p{font-size:.8rem;color:#aab;margin-top:6px}
header .legend{margin-top:10px;display:flex;flex-wrap:wrap;gap:14px;font-size:.76rem;color:#ccd}
header .legend span{display:inline-flex;align-items:center;gap:5px}
.h-demo{display:inline-block;border-top:2px solid #e88;padding-top:1px}
.drop-demo{display:inline-block;border-top:2px solid #e88;border-right:2px solid #e88;padding-top:1px;padding-right:2px}
.controls{padding:14px 20px;background:#fff;border-bottom:1px solid #e0deda;position:sticky;top:0;z-index:10;display:flex;flex-wrap:wrap;gap:10px;align-items:center}
#search{flex:1;min-width:180px;padding:8px 14px;border:1.5px solid #ccc;border-radius:20px;font-size:.9rem;outline:none;font-family:inherit}
#search:focus{border-color:#1a1a2e}
.grades{display:flex;flex-wrap:wrap;gap:5px}
.grades button{padding:5px 11px;border:1.5px solid #ccc;border-radius:16px;background:#fff;font-size:.78rem;cursor:pointer;font-family:inherit;transition:.15s}
.grades button.active{background:#1a1a2e;color:#fff;border-color:#1a1a2e}
#stats{padding:8px 20px;font-size:.78rem;color:#666}
#grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;padding:12px 20px 40px}
.card{background:#fff;border-radius:10px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,.07);transition:.15s}
.card:hover{box-shadow:0 3px 12px rgba(0,0,0,.12);transform:translateY(-1px)}
.kanji{font-size:3.2rem;font-weight:900;text-align:center;line-height:1;margin-bottom:6px}
.grade-badge{text-align:center;margin-bottom:10px}
.grade-badge span{display:inline-block;padding:2px 8px;border-radius:10px;font-size:.68rem;font-weight:700}
.readings{font-size:.78rem;line-height:1.7;margin-bottom:8px}
.reading-row{display:flex;align-items:baseline;gap:4px;margin-bottom:1px}
.label{color:#999;font-size:.68rem;width:26px;flex-shrink:0}
.reading-text{display:inline-flex;flex-wrap:wrap;align-items:baseline}
.h{display:inline-block;border-top:2px solid #c0392b;padding-top:1px;margin-top:3px}
.h.drop{border-right:2px solid #c0392b;padding-right:1px;margin-right:1px}
.l{display:inline-block}
.flat-end::after{content:"→";font-size:.6rem;color:#aaa;margin-left:2px}
.oku{color:#bbb}
.meaning{font-size:.74rem;color:#444;border-top:1px solid #f0ede8;padding-top:8px;line-height:1.55;margin-bottom:6px}
.examples{border-top:1px solid #f0ede8;padding-top:8px}
.ex-label{font-size:.63rem;color:#aaa;font-weight:600;letter-spacing:.06em;margin-bottom:4px}
.ex{font-size:.73rem;color:#555;line-height:1.55;padding-left:8px;border-left:2px solid #e8e4de;margin-bottom:3px}
.no-results{text-align:center;padding:60px;color:#999;grid-column:1/-1}
footer{text-align:center;padding:20px;font-size:.72rem;color:#aaa;border-top:1px solid #e0deda}
@media(max-width:500px){#grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;padding:8px 10px 40px}.kanji{font-size:2.6rem}}
</style>
</head>
<body>
<header>
  <h1>常用漢字一覧 — 読み・アクセント・意味・例文</h1>
  <p>全2136字（現在：1917字収録）｜読み・ピッチアクセント・日本語説明・例文付き</p>
  <div class="legend">
    <span><span class="h-demo">高</span> 高い音（上線）</span>
    <span><span class="drop-demo">高</span>↓ 下がり目（右線）</span>
    <span>低 飾りなし</span>
    <span>→ 平板型</span>
  </div>
</header>
<div class="controls">
  <input type="text" id="search" placeholder="漢字・読み・意味・例文で検索…">
  <div class="grades">
    <button data-g="0" class="active">すべて</button>
    <button data-g="1">1年</button>
    <button data-g="2">2年</button>
    <button data-g="3">3年</button>
    <button data-g="4">4年</button>
    <button data-g="5">5年</button>
    <button data-g="6">6年</button>
    <button data-g="7">中学</button>
  </div>
</div>
<div id="stats"></div>
<div id="grid"></div>
<footer>アクセントはNHK東京方言基準。詳細はNHK日本語発音アクセント新辞典でご確認ください。</footer>

<script>
const GN={1:'1年',2:'2年',3:'3年',4:'4年',5:'5年',6:'6年',7:'中学'};
const GB={1:'#dbeafe',2:'#dcfce7',3:'#fef9c3',4:'#ffedd5',5:'#f3e8ff',6:'#fce7f3',7:'#e2e8f0'};
const GT={1:'#1e40af',2:'#166534',3:'#713f12',4:'#9a3412',5:'#581c87',6:'#831843',7:'#1e293b'};

function splitMorae(s){
  const sm='ゃゅょャュョぁぃぅぇぉァィゥェォ';
  const m=[];
  for(let i=0;i<s.length;i++){
    const c=s[i];
    if(c==='-'||c==='.'||c===' ')continue;
    if(i+1<s.length&&sm.includes(s[i+1])){m.push(c+s[i+1]);i++;}
    else m.push(c);
  }
  return m;
}
function accentHTML(reading,acc){
  const pts=reading.split('.');
  const base=pts[0].replace(/-$/,'');
  const oku=pts[1]||'';
  const m=splitMorae(base);
  if(acc===undefined||acc===null)return `${base}<span class="oku">${oku}</span>`;
  let h='';
  for(let i=0;i<m.length;i++){
    const p=i+1;
    let hi=acc===0?p>1:acc===1?p===1:p>=2&&p<=acc;
    const drop=acc>0&&p===acc;
    h+=hi?`<span class="h${drop?' drop':''}">${m[i]}</span>`:`<span class="l">${m[i]}</span>`;
  }
  if(oku)h+=`<span class="oku">${oku}</span>`;
  if(acc===0&&m.length>1)h+='<span class="flat-end"></span>';
  return h;
}
function makeCard(d){
  const[k,g,on,kun,m,exs]=d;
  const onH=on.filter(r=>r.length>=2).map(([r,a])=>`<div class="reading-row"><span class="label">音</span><span class="reading-text">${accentHTML(r,a)}</span></div>`).join('');
  const kunH=kun.filter(r=>r.length>=2).map(([r,a])=>`<div class="reading-row"><span class="label">訓</span><span class="reading-text">${accentHTML(r,a)}</span></div>`).join('');
  const exH=exs&&exs.length?`<div class="examples"><div class="ex-label">例文</div>${exs.map(e=>`<div class="ex">${e}</div>`).join('')}</div>`:'';
  return`<div class="card" data-g="${g}">
<div class="kanji">${k}</div>
<div class="grade-badge"><span style="background:${GB[g]};color:${GT[g]}">${GN[g]||'中学'}</span></div>
<div class="readings">${onH}${kunH||'<div class="reading-row"><span class="label">訓</span><span style="color:#ddd">—</span></div>'}</div>
<div class="meaning">${m}</div>
${exH}
</div>`;
}

const cache={};
let allData=[],cg=0,cs='';

function render(data){
  let cnt=0;
  const html=data.map(d=>{
    const[k,g,on,kun,m,exs]=d;
    if(cs){
      const hay=k+on.map(x=>x[0]).join('')+kun.map(x=>x[0]).join('')+m+(exs||[]).join('');
      if(!hay.includes(cs))return'';
    }
    cnt++;return makeCard(d);
  }).join('');
  document.getElementById('grid').innerHTML=html||'<div class="no-results">該当する漢字が見つかりません</div>';
  document.getElementById('stats').textContent=`${cnt}字 表示中（収録：${allData.length}字）`;
}

function currentData(){return cg===0?allData:(cache[cg]||[]);}

async function loadGrade(g){
  if(cache[g])return cache[g];
  const r=await fetch(`kanji/grade${g}.json`);
  if(!r.ok)throw new Error(`grade${g}.json: ${r.status}`);
  cache[g]=await r.json();
  return cache[g];
}

async function init(){
  document.getElementById('grid').innerHTML='<div class="no-results">読み込み中…</div>';
  try{
    const all=await Promise.all([1,2,3,4,5,6,7].map(loadGrade));
    allData=all.flat();
    render(allData);
  }catch(e){
    document.getElementById('grid').innerHTML=`<div class="no-results">データ読み込みエラー: ${e.message}<br>ページを再読み込みしてください。</div>`;
  }
}

document.getElementById('search').addEventListener('input',e=>{cs=e.target.value.trim();render(currentData());});
document.querySelector('.grades').addEventListener('click',e=>{
  const b=e.target.closest('button');if(!b)return;
  document.querySelectorAll('.grades button').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');cg=parseInt(b.dataset.g);render(currentData());
});

init();
</script>
</body></html>
