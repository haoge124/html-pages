<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>常用漢字一覧 — 読み・アクセント・意味・例文</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--surface:#161b27;--surface2:#1e2535;
  --border:rgba(240,192,64,.12);--gold:#f0c040;--gold-dim:rgba(240,192,64,.5);
  --text:#e4e0d8;--text-muted:#8a8aaa;--text-faint:#4a4a62;
}
body{font-family:"Hiragino Sans","Yu Gothic UI",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
header{background:linear-gradient(135deg,#0a0f1a 0%,#111827 100%);color:#fff;padding:24px 20px 16px;border-bottom:1px solid var(--border)}
header h1{font-size:1.4rem;font-weight:700;letter-spacing:.05em;color:var(--gold)}
header p{font-size:.8rem;color:var(--text-muted);margin-top:6px}
header .legend{margin-top:10px;display:flex;flex-wrap:wrap;gap:14px;font-size:.76rem;color:var(--text-muted)}
header .legend span{display:inline-flex;align-items:center;gap:5px}
.h-demo{display:inline-block;border-top:2px solid #e06060;padding-top:1px}
.drop-demo{display:inline-block;border-top:2px solid #e06060;border-right:2px solid #e06060;padding-top:1px;padding-right:2px}
.controls{padding:14px 20px;background:rgba(13,15,21,.98);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10;display:flex;flex-wrap:wrap;gap:10px;align-items:center}
#search{flex:1;min-width:180px;padding:8px 14px;border:1.5px solid rgba(255,255,255,.1);border-radius:20px;font-size:.9rem;outline:none;font-family:inherit;background:var(--surface);color:var(--text)}
#search:focus{border-color:var(--gold)}
#search::placeholder{color:var(--text-faint)}
.grades{display:flex;flex-wrap:wrap;gap:5px}
.grades button{padding:5px 11px;border:1.5px solid rgba(255,255,255,.1);border-radius:16px;background:transparent;color:var(--text-muted);font-size:.78rem;cursor:pointer;font-family:inherit;transition:.15s}
.grades button:hover{border-color:var(--gold);color:var(--gold)}
.grades button.active{background:var(--gold);color:#0f1117;border-color:var(--gold);font-weight:700}
#stats{padding:8px 20px;font-size:.78rem;color:var(--text-faint)}
#grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;padding:12px 20px 40px}
.card{background:var(--surface);border-radius:10px;padding:16px;border:1px solid var(--border);transition:box-shadow .2s,transform .2s,border-color .2s;position:relative}
.card:hover{box-shadow:0 0 0 1px var(--gold-dim),0 4px 24px rgba(240,192,64,.08);transform:translateY(-1px);border-color:rgba(240,192,64,.28)}
.kanji{font-size:3.2rem;font-weight:900;text-align:center;line-height:1;margin-bottom:6px;font-family:"Hiragino Mincho ProN","Yu Mincho",Georgia,serif;color:var(--text);cursor:pointer;transition:color .15s}
.kanji:hover{color:var(--gold)}
.kanji.speaking{color:#3b82f6}
.grade-badge{text-align:center;margin-bottom:10px}
.grade-badge span{display:inline-block;padding:2px 8px;border-radius:10px;font-size:.68rem;font-weight:700}
.readings{font-size:.78rem;line-height:1.7;margin-bottom:8px}
.reading-row{display:flex;align-items:baseline;gap:4px;margin-bottom:1px}
.label{color:var(--text-faint);font-size:.68rem;width:26px;flex-shrink:0}
.reading-text{display:inline-flex;flex-wrap:wrap;align-items:baseline;color:var(--text-muted)}
.h{display:inline-block;border-top:2px solid #e06060;padding-top:1px;margin-top:3px}
.h.drop{border-right:2px solid #e06060;padding-right:1px;margin-right:1px}
.l{display:inline-block}
.flat-end::after{content:"→";font-size:.6rem;color:var(--text-faint);margin-left:2px}
.oku{color:var(--text-faint)}
.meaning{font-size:.74rem;color:var(--text-muted);border-top:1px solid rgba(255,255,255,.05);padding-top:8px;line-height:1.55;margin-bottom:6px}
.examples{border-top:1px solid rgba(255,255,255,.05);padding-top:8px}
.ex-label{font-size:.63rem;color:var(--text-faint);font-weight:600;letter-spacing:.06em;margin-bottom:4px}
.ex{font-size:.73rem;color:var(--text-muted);line-height:1.55;padding-left:8px;border-left:2px solid rgba(240,192,64,.25);margin-bottom:3px;cursor:pointer;transition:color .15s,border-color .15s}
.ex:hover{color:var(--text);border-left-color:var(--gold)}
.ex.speaking{color:#3b82f6;border-left-color:#3b82f6}
.no-results{text-align:center;padding:60px;color:var(--text-faint);grid-column:1/-1}
footer{text-align:center;padding:20px;font-size:.72rem;color:var(--text-faint);border-top:1px solid var(--border)}
@media(max-width:500px){#grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;padding:8px 10px 40px}.kanji{font-size:2.6rem}}
.check-btn{position:absolute;top:10px;right:10px;width:28px;height:28px;border-radius:50%;border:1.5px solid rgba(255,255,255,.12);background:transparent;font-size:.8rem;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-faint);transition:.15s;-webkit-tap-highlight-color:transparent}
.check-btn:hover{border-color:#22c55e;color:#22c55e}
.check-btn.checked{background:#22c55e;border-color:#22c55e;color:#fff}
.hard-btn{position:absolute;top:10px;right:44px;width:28px;height:28px;border-radius:50%;border:1.5px solid rgba(255,255,255,.12);background:transparent;font-size:.82rem;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-faint);transition:.15s;-webkit-tap-highlight-color:transparent}
.hard-btn:hover{border-color:#f59e0b;color:#f59e0b}
.hard-btn.hard{background:#f59e0b;border-color:#f59e0b;color:#fff}
.card.hard-mode{border-color:rgba(245,158,11,.35)}
.srs{border-top:1px dashed rgba(245,158,11,.3);margin-top:8px;padding-top:8px}
.srs-due{font-size:.7rem;font-weight:700;margin-bottom:6px}
.srs-due.now{color:#f59e0b}
.srs-due.wait{color:var(--text-faint)}
.srs-btns{display:flex;gap:6px}
.srs-btns button{flex:1;padding:5px 0;border-radius:7px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.04);color:var(--text-muted);font-size:.7rem;cursor:pointer;font-family:inherit}
.srs-btns button.good:hover{border-color:#22c55e;color:#22c55e}
.srs-btns button.vague:hover{border-color:#60a5fa;color:#60a5fa}
.srs-btns button.forgot:hover{border-color:#e06060;color:#e06060}
#show-checked-btn{padding:5px 11px;border:1.5px solid rgba(255,255,255,.1);border-radius:16px;background:transparent;color:var(--text-muted);font-size:.78rem;cursor:pointer;font-family:inherit;transition:.15s;white-space:nowrap}
#show-checked-btn.active{background:#22c55e;color:#fff;border-color:#22c55e}
#show-hard-btn{padding:5px 11px;border:1.5px solid rgba(255,255,255,.1);border-radius:16px;background:transparent;color:var(--text-muted);font-size:.78rem;cursor:pointer;font-family:inherit;transition:.15s;white-space:nowrap}
#show-hard-btn.active{background:#f59e0b;color:#fff;border-color:#f59e0b}
#settings-btn{padding:5px 10px;border:1.5px solid rgba(255,255,255,.1);border-radius:16px;background:transparent;color:var(--text-muted);font-size:.85rem;cursor:pointer;transition:.15s}
#settings-btn:hover{border-color:var(--gold);color:var(--gold)}
.speak-btn{position:absolute;top:10px;left:10px;width:28px;height:28px;border-radius:50%;border:1.5px solid rgba(255,255,255,.12);background:transparent;font-size:.8rem;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-faint);transition:.15s;-webkit-tap-highlight-color:transparent}
.speak-btn:hover{border-color:#3b82f6;color:#3b82f6}
.speak-btn.speaking{background:#3b82f6;border-color:#3b82f6;color:#fff}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:100;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:24px;width:min(420px,90vw);box-shadow:0 8px 32px rgba(0,0,0,.5)}
.modal h2{font-size:1rem;margin-bottom:14px;color:var(--gold)}
.modal label{font-size:.78rem;color:var(--text-muted);display:block;margin-bottom:4px}
.modal input{width:100%;padding:7px 12px;border:1.5px solid rgba(255,255,255,.1);border-radius:8px;font-size:.85rem;font-family:inherit;outline:none;margin-bottom:12px;background:var(--bg);color:var(--text)}
.modal input:focus{border-color:var(--gold)}
.modal .hint{font-size:.7rem;color:var(--text-faint);margin-top:-8px;margin-bottom:12px}
.modal-btns{display:flex;gap:8px;justify-content:flex-end}
.modal-btns button{padding:6px 16px;border-radius:8px;border:none;cursor:pointer;font-size:.82rem;font-family:inherit}
.btn-save{background:var(--gold);color:#0f1117;font-weight:700}
.btn-cancel{background:rgba(255,255,255,.07);color:var(--text-muted)}
</style>
</head>
<body>
<header>
  <h1>常用漢字一覧 — 読み・アクセント・意味・例文</h1>
  <p>全2136字収録｜読み・ピッチアクセント・日本語説明・例文・音声付き</p>
  <div class="legend">
    <span><span class="h-demo">高</span> 高い音（上線）</span>
    <span><span class="drop-demo">高</span>↓ 下がり目（右線）</span>
    <span>低 飾りなし</span>
    <span>→ 平板型</span>
  </div>
</header>
<div class="controls">
  <input type="text" id="search" placeholder="漢字・読み・意味・例文で検索…">
  <div class="grades">
    <button data-g="0" class="active">すべて</button>
    <button data-g="1">1年</button>
    <button data-g="2">2年</button>
    <button data-g="3">3年</button>
    <button data-g="4">4年</button>
    <button data-g="5">5年</button>
    <button data-g="6">6年</button>
    <button data-g="7">中学</button>
  </div>
  <button id="show-checked-btn">✓ 0字</button>
  <button id="show-hard-btn">★ 難記 0字</button>
  <button id="settings-btn" title="音声設定">⚙️</button>
</div>
<div id="stats"></div>
<div id="grid"></div>
<footer>アクセントはNHK東京方言基準。音声は VOICEVOX を使用。⚙️ から URL を設定してください。</footer>

<div class="modal-overlay" id="settings-modal">
  <div class="modal">
    <h2>🔊 音声設定（VOICEVOX）</h2>
    <label>VOICEVOX サーバーURL</label>
    <input type="url" id="vv-url-input" placeholder="https://xxxx.trycloudflare.com">
    <div class="hint">空欄の場合はブラウザ内蔵音声を使用。</div>
    <label>話者</label>
    <input type="number" id="vv-speaker-input" value="3" min="1" max="99">
    <div class="hint">3=ずんだもん / 2=四国めたん / 8=春日部つむぎ など</div>
    <div class="modal-btns">
      <button class="btn-cancel" id="settings-cancel">キャンセル</button>
      <button class="btn-save" id="settings-save">保存</button>
    </div>
  </div>
</div>

<script>
const VV_KEY='vv_url_v1';
const VV_SPK_KEY='vv_speaker_v1';
const VV_DEFAULT='https://amendments-kernel-viewer-catalogue.trycloudflare.com';
function getVvUrl(){return localStorage.getItem(VV_KEY)||VV_DEFAULT;}
function getVvSpeaker(){return parseInt(localStorage.getItem(VV_SPK_KEY)||'3');}

function setBtnState(id,on){
  if(!id)return;
  document.querySelectorAll(`[data-id="${id}"]`).forEach(el=>el.classList.toggle('speaking',on));
}
async function speakVoicevox(text,id){
  const base=getVvUrl().replace(/\/$/,'');
  const spk=getVvSpeaker();
  setBtnState(id,true);
  try{
    const qr=await fetch(`${base}/audio_query?text=${encodeURIComponent(text)}&speaker=${spk}`,{method:'POST'});
    if(!qr.ok)throw new Error('query');
    const query=await qr.json();
    const ar=await fetch(`${base}/synthesis?speaker=${spk}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(query)});
    if(!ar.ok)throw new Error('synthesis');
    const audio=new Audio(URL.createObjectURL(await ar.blob()));
    audio.onended=()=>setBtnState(id,false);
    audio.onerror=()=>setBtnState(id,false);
    audio.play();
  }catch(e){
    setBtnState(id,false);
    speakFallback(text,id);
  }
}
function speakFallback(text,id){
  if(!window.speechSynthesis)return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='ja-JP';u.rate=0.85;
  setBtnState(id,true);
  u.onend=()=>setBtnState(id,false);
  u.onerror=()=>setBtnState(id,false);
  speechSynthesis.speak(u);
}
function speak(text,id){
  getVvUrl()?speakVoicevox(text,id):speakFallback(text,id);
}

const GN={1:'1年',2:'2年',3:'3年',4:'4年',5:'5年',6:'6年',7:'中学'};
const GB={1:'rgba(96,165,250,.14)',2:'rgba(74,222,128,.14)',3:'rgba(251,191,36,.14)',4:'rgba(251,146,60,.14)',5:'rgba(192,132,252,.14)',6:'rgba(244,114,182,.14)',7:'rgba(148,163,184,.16)'};
const GT={1:'#60a5fa',2:'#4ade80',3:'#fbbf24',4:'#fb923c',5:'#c084fc',6:'#f472b6',7:'#cbd5e1'};

function splitMorae(s){
  const sm='ゃゅょャュョぁぃぅぇぉァィゥェォ';
  const m=[];
  for(let i=0;i<s.length;i++){
    const c=s[i];
    if(c==='-'||c==='.'||c===' ')continue;
    if(i+1<s.length&&sm.includes(s[i+1])){m.push(c+s[i+1]);i++;}
    else m.push(c);
  }
  return m;
}
function accentHTML(reading,acc){
  const pts=reading.split('.');
  const base=pts[0].replace(/-$/,'');
  const oku=pts[1]||'';
  const m=splitMorae(base);
  if(acc===undefined||acc===null)return `${base}<span class="oku">${oku}</span>`;
  let h='';
  for(let i=0;i<m.length;i++){
    const p=i+1;
    let hi=acc===0?p>1:acc===1?p===1:p>=2&&p<=acc;
    const drop=acc>0&&p===acc;
    h+=hi?`<span class="h${drop?' drop':''}">${m[i]}</span>`:`<span class="l">${m[i]}</span>`;
  }
  if(oku)h+=`<span class="oku">${oku}</span>`;
  if(acc===0&&m.length>1)h+='<span class="flat-end"></span>';
  return h;
}
const STORAGE_KEY='kanji_checked_v1';
let checked=new Set(JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]'));
let showChecked=false;
const HARD_KEY='kanji_hard_v1';
// 形式: { 漢字: {stage:int, next:ms, added:ms, last:ms} }
let hard=JSON.parse(localStorage.getItem(HARD_KEY)||'{}');
let showHard=false;
const SRS_DAYS=[1,2,4,7,15,30,60];
const DAY=86400000;

function saveChecked(){localStorage.setItem(STORAGE_KEY,JSON.stringify([...checked]));}
function toggleCheck(kanji){
  checked.has(kanji)?checked.delete(kanji):checked.add(kanji);
  saveChecked();render(currentData());
}
function updateCheckedBtn(){
  const btn=document.getElementById('show-checked-btn');
  btn.textContent=`✓ ${checked.size}字`;
  btn.classList.toggle('active',showChecked);
}
function saveHard(){localStorage.setItem(HARD_KEY,JSON.stringify(hard));}
function isHard(kanji){return Object.prototype.hasOwnProperty.call(hard,kanji);}
function toggleHard(kanji){
  if(isHard(kanji)){delete hard[kanji];}
  else{const now=Date.now();hard[kanji]={stage:0,next:now,added:now,last:0};}
  saveHard();render(currentData());
}
function reviewHard(kanji,result){
  const h=hard[kanji];if(!h)return;
  const now=Date.now();
  if(result==='good')h.stage=Math.min(h.stage+1,SRS_DAYS.length-1);
  else if(result==='forgot')h.stage=0;
  // 'vague' は段階据え置き
  h.last=now;h.next=now+SRS_DAYS[h.stage]*DAY;
  saveHard();render(currentData());
}
function dueHTML(kanji){
  const h=hard[kanji];if(!h)return'';
  const now=Date.now();
  if(h.next<=now)return`<div class="srs-due now">● 復習する（第${h.stage+1}段階・${SRS_DAYS[h.stage]}日間隔）</div>`;
  const d=Math.ceil((h.next-now)/DAY);
  return`<div class="srs-due wait">○ あと${d}日（第${h.stage+1}段階）</div>`;
}
function updateHardBtn(){
  const btn=document.getElementById('show-hard-btn');
  btn.textContent=`★ 難記 ${Object.keys(hard).length}字`;
  btn.classList.toggle('active',showHard);
}

function makeCard(d){
  const[k,g,on,kun,m,exs]=d;
  const isChecked=checked.has(k);
  const hardOn=isHard(k);
  const id='k'+k.codePointAt(0);
  const onH=on.filter(r=>r.length>=2).map(([r,a])=>`<div class="reading-row"><span class="label">音</span><span class="reading-text">${accentHTML(r,a)}</span></div>`).join('');
  const kunH=kun.filter(r=>r.length>=2).map(([r,a])=>`<div class="reading-row"><span class="label">訓</span><span class="reading-text">${accentHTML(r,a)}</span></div>`).join('');
  const exH=exs&&exs.length?`<div class="examples"><div class="ex-label">例文（タップで読み上げ）</div>${exs.map((e,i)=>`<div class="ex" data-id="${id}e${i}" title="タップで読み上げ">${e}</div>`).join('')}</div>`:'';
  const srsH=(showHard&&hardOn)?`<div class="srs">${dueHTML(k)}<div class="srs-btns"><button class="good" data-rev="good" data-k="${k}">覚えてた</button><button class="vague" data-rev="vague" data-k="${k}">あいまい</button><button class="forgot" data-rev="forgot" data-k="${k}">忘れた</button></div></div>`:'';
  return`<div class="card${hardOn?' hard-mode':''}" data-g="${g}">
<button class="speak-btn" data-id="${id}" data-text="${k}" title="読み上げ">🔊</button>
<button class="hard-btn${hardOn?' hard':''}" data-hard="${k}" title="難記">★</button>
<button class="check-btn${isChecked?' checked':''}" data-kanji="${k}" title="覚えた">✓</button>
<div class="kanji" data-text="${k}" data-id="${id}" title="タップで読み上げ">${k}</div>
<div class="grade-badge"><span style="background:${GB[g]};color:${GT[g]}">${GN[g]||'中学'}</span></div>
<div class="readings">${onH}${kunH||'<div class="reading-row"><span class="label">訓</span><span style="color:#ddd">—</span></div>'}</div>
<div class="meaning">${m}</div>
${exH}
${srsH}
</div>`;
}

const cache={};
let allData=[],cg=0,cs='';

function render(data){
  let list=data;
  if(showHard){
    list=data.filter(d=>isHard(d[0])).sort((a,b)=>hard[a[0]].next-hard[b[0]].next);
  }
  let cnt=0;
  const html=list.map(d=>{
    const[k,g,on,kun,m,exs]=d;
    if(!showHard&&checked.has(k)&&!showChecked)return'';
    if(cs){
      const hay=k+on.map(x=>x[0]).join('')+kun.map(x=>x[0]).join('')+m+(exs||[]).join('');
      if(!hay.includes(cs))return'';
    }
    cnt++;return makeCard(d);
  }).join('');
  document.getElementById('grid').innerHTML=html||'<div class="no-results">該当する漢字が見つかりません</div>';
  document.getElementById('stats').textContent=`${cnt}字 表示中（未チェック：${allData.length-checked.size}字 / 難記：${Object.keys(hard).length}字 / 収録：${allData.length}字）`;
  updateCheckedBtn();
  updateHardBtn();
}

function currentData(){return cg===0?allData:(cache[cg]||[]);}

async function loadGrade(g){
  if(cache[g])return cache[g];
  const r=await fetch(`kanji/grade${g}.json`);
  if(!r.ok)throw new Error(`grade${g}.json: ${r.status}`);
  cache[g]=await r.json();
  return cache[g];
}

async function init(){
  document.getElementById('grid').innerHTML='<div class="no-results">読み込み中…</div>';
  try{
    const all=await Promise.all([1,2,3,4,5,6,7].map(loadGrade));
    allData=all.flat();
    render(allData);
  }catch(e){
    document.getElementById('grid').innerHTML=`<div class="no-results">データ読み込みエラー: ${e.message}<br>ページを再読み込みしてください。</div>`;
  }
}

document.getElementById('search').addEventListener('input',e=>{cs=e.target.value.trim();render(currentData());});
document.querySelector('.grades').addEventListener('click',e=>{
  const b=e.target.closest('button');if(!b)return;
  document.querySelectorAll('.grades button').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');cg=parseInt(b.dataset.g);render(currentData());
});
document.getElementById('show-checked-btn').addEventListener('click',()=>{
  showChecked=!showChecked;if(showChecked)showHard=false;render(currentData());
});
document.getElementById('show-hard-btn').addEventListener('click',()=>{
  showHard=!showHard;if(showHard)showChecked=false;render(currentData());
});
document.getElementById('grid').addEventListener('click',e=>{
  const sb=e.target.closest('.speak-btn');
  if(sb){speak(sb.dataset.text,sb.dataset.id);return;}
  const kj=e.target.closest('.kanji');
  if(kj){speak(kj.dataset.text,kj.dataset.id);return;}
  const ex=e.target.closest('.ex');
  if(ex){speak(ex.textContent.trim(),ex.dataset.id);return;}
  const hb=e.target.closest('.hard-btn');
  if(hb){toggleHard(hb.dataset.hard);return;}
  const rv=e.target.closest('[data-rev]');
  if(rv){reviewHard(rv.dataset.k,rv.dataset.rev);return;}
  const btn=e.target.closest('.check-btn');if(!btn)return;
  toggleCheck(btn.dataset.kanji);
});
document.getElementById('settings-btn').addEventListener('click',()=>{
  document.getElementById('vv-url-input').value=getVvUrl();
  document.getElementById('vv-speaker-input').value=getVvSpeaker();
  document.getElementById('settings-modal').classList.add('open');
});
document.getElementById('settings-cancel').addEventListener('click',()=>{
  document.getElementById('settings-modal').classList.remove('open');
});
document.getElementById('settings-save').addEventListener('click',()=>{
  const url=document.getElementById('vv-url-input').value.trim();
  const spk=document.getElementById('vv-speaker-input').value.trim();
  if(url)localStorage.setItem(VV_KEY,url);else localStorage.removeItem(VV_KEY);
  localStorage.setItem(VV_SPK_KEY,spk||'3');
  document.getElementById('settings-modal').classList.remove('open');
});
document.getElementById('settings-modal').addEventListener('click',e=>{
  if(e.target===e.currentTarget)e.currentTarget.classList.remove('open');
});

init();
</script>
</body></html>
