2, 35.684817459717145], [139.69080840983537, 35.68433401517023]]]}}, {"type": "Feature", "properties": {"識別id": 644, "利用時間": "09:00-19:00", "制限時間": 60, "手数料": 300, "制限事項1": "日曜・休日を除く", "制限事項2": "１月１日〜３日を除く", "種別": "パーキング・チケット", "普通車": true, "貨物用有り": true, "二輪車": false, "標章車専用有り": false, "_dist": 1128}, "geometry": {"type": "MultiLineString", "coordinates": [[[139.71265355960898, 35.69767000712272], [139.71200876552905, 35.697647889712044], [139.71057446281347, 35.69762496740127], [139.70911439069334, 35.69765029330015], [139.70796320251617, 35.69779931642498]]]}}, {"type": "Feature", "properties": {"識別id": 643, "利用時間": "09:00-19:00", "制限時間": 60, "手数料": 300, "制限事項1": "日曜・休日を除く", "制限事項2": "１月１日〜３日を除く", "種別": "パーキング・チケット", "普通車": true, "貨物用有り": false, "二輪車": false, "標章車専用有り": false, "_dist": 1146}, "geometry": {"type": "MultiLineString", "coordinates": [[[139.7080315877887, 35.69795877953938], [139.70892075983437, 35.69782541644032], [139.70950706242323, 35.697783036482534]]]}}]};
const CENTER = [35.6896, 139.7006];
const RADIUS = 1200;

const map = L.map('map', { zoomControl:false }).setView(CENTER, 15);
L.control.zoom({ position:'topright' }).addTo(map);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19, attribution: '&copy; OpenStreetMap | データ: 警視庁(parking-meter.jp)'
}).addTo(map);

L.circle(CENTER, { radius:RADIUS, color:'#3b82f6', weight:1, fillColor:'#3b82f6', fillOpacity:0.06 }).addTo(map);
L.marker(CENTER).addTo(map).bindPopup('<b>新宿駅</b><br>中心地点');

function endTime(p) { const t = p['利用時間']||''; return t.indexOf('-')>=0 ? t.split('-')[1] : ''; }
function colorFor(p) {
  const e = endTime(p);
  if (e === '19:00') return '#e8453c';   // 19時終了 = 赤
  if (e === '20:00') return '#f59e0b';   // 20時終了 = 橙
  return '#6b7280';                       // その他 = 灰
}
function hasSun(p) { return ((p['制限事項1']||'') + (p['制限事項2']||'')).indexOf('日曜') >= 0; }

const layers = {};
function popHtml(p) {
  const veh = [];
  if (p['普通車']==='True') veh.push('普通車');
  if (p['二輪車']==='True') veh.push('二輪車');
  if (p['貨物用有り']==='True') veh.push('貨物');
  const notes = [p['制限事項1'], p['制限事項2']].filter(Boolean).map(s => '※' + s);
  const hoursCell = (p['利用時間'] || '-')
    + (notes.length ? `<br><span style="color:#b45309;font-size:11px">${notes.join('<br>')}</span>` : '');
  return `<div class="pop"><b>${p['種別']||''}</b><table>`
    + `<tr><td>利用時間</td><td>${hoursCell}</td></tr>`
    + `<tr><td>制限時間</td><td>${p['制限時間']||'-'}分</td></tr>`
    + `<tr><td>手数料</td><td>${p['手数料']||'-'}円</td></tr>`
    + `<tr><td>対象車種</td><td>${veh.join('・')||'-'}</td></tr>`
    + `<tr><td>中心から</td><td>約${p['_dist']}m</td></tr>`
    + `</table></div>`;
}

const gj = L.geoJSON(DATA, {
  style: f => ({ color: colorFor(f.properties), weight:6, opacity:0.85, lineCap:'round' }),
  onEachFeature: (f,l) => {
    l.bindPopup(popHtml(f.properties));
    layers[f.properties['識別id']] = l;
    l.on('mouseover', ()=> l.setStyle({ weight:9, opacity:1 }));
    l.on('mouseout',  ()=> l.setStyle({ weight:6, opacity:0.85 }));
  }
}).addTo(map);

// 日曜・休日を除く区間に緑の破線を重ねて表示（クリックは下のベース線へ通す）
const sunFC = { type:'FeatureCollection', features: DATA.features.filter(f => hasSun(f.properties)) };
L.geoJSON(sunFC, {
  interactive:false,
  style: { color:'#16a34a', weight:3, opacity:0.95, dashArray:'2,7', lineCap:'round' }
}).addTo(map);

if (DATA.features.length) map.fitBounds(gj.getBounds().pad(0.1));

const list = document.getElementById('list');
DATA.features.forEach(f => {
  const p = f.properties;
  const row = document.createElement('div');
  row.className = 'row';
  const notes = [p['制限事項1'], p['制限事項2']].filter(Boolean).map(s => '※' + s).join(' ');
  row.innerHTML = `<span class="d">${p['_dist']}m</span>`
                + `<span class="hb"><span class="h">${p['利用時間']||'-'}</span>`
                + (notes ? `<span class="note">${notes}</span>` : '') + `</span>`
                + `<span class="m">${p['制限時間']}分/${p['手数料']}円</span>`;
  row.onclick = () => { const l = layers[p['識別id']]; if(l){ map.fitBounds(l.getBounds().pad(2)); l.openPopup(); } };
  list.appendChild(row);
});
</script>
